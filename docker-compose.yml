# =====================================================================
#  Eros – Full Stack Docker Compose (GitHub-gestützt)
# =====================================================================
#  Quelle:  https://github.com/itsbloodybyte/project-eros
#
#  Alle Build-Schritte sind INLINE in dieser YAML definiert. Kein
#  lokales `git clone` nötig, und – wichtig – die Host-BuildKit-Instanz
#  braucht kein eigenes `git` im PATH (relevant für Synology NAS
#  Container-Manager, Docker Desktop ohne BuildKit-Git-Support, etc.).
#  Das Klonen passiert in einem Alpine-Fetcher-Stage, der sein eigenes
#  `git` mitbringt.
#
#  Services:
#    mongo    : MongoDB 7 mit persistentem Volume.
#    backend  : FastAPI + WebSocket-Server (uvicorn auf :8001).
#    frontend : nginx serviert das gebaute React-Bundle und proxyt
#               /api sowie /api/ws/* an `backend`.
#
#  One-Command Start (in einem leeren Ordner):
#      curl -O https://raw.githubusercontent.com/itsbloodybyte/project-eros/main/docker-compose.yml
#      docker compose up --build -d
#
#  Ein `.env` ist optional: ohne Datei nutzt Compose die sicheren
#  Defaults unten. JWT_SECRET wird beim ersten Start automatisch
#  generiert und im Volume `backend_data` unter /data/jwt_secret.key
#  persistiert, damit Sessions Restarts überleben. Für Produktion in
#  einer `.env` explizit setzen (siehe .env.example).
#
#  App erreichbar unter:  http://localhost:8585  (über FRONTEND_HOST_PORT anpassbar)
# =====================================================================

services:
  mongo:
    image: mongo:7
    container_name: eros-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-eros}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-eros-mongo-change-me}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-eros}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - eros_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # Kein Host-Port – nur das Backend erreicht Mongo.

  backend:
    image: eros-backend:latest
    container_name: eros-backend
    restart: unless-stopped
    build:
      # Dummy-Kontext – das eigentliche Klonen passiert im Fetcher-Stage.
      context: .
      args:
        EROS_REPO: ${EROS_REPO:-https://github.com/itsbloodybyte/project-eros.git}
        EROS_REF: ${EROS_REF:-main}
      dockerfile_inline: |
        # ---- Fetcher: eigenes git, klont nur den Backend-Subpfad ----
        FROM alpine/git:latest AS fetch
        ARG EROS_REPO
        ARG EROS_REF
        RUN set -eux; \
            git clone --depth=1 --branch "$$EROS_REF" "$$EROS_REPO" /src

        # ---- Runtime: python:3.11-slim + native deps ----
        FROM python:3.11-slim
        ENV PYTHONDONTWRITEBYTECODE=1 \
            PYTHONUNBUFFERED=1 \
            PIP_DISABLE_PIP_VERSION_CHECK=1 \
            PIP_NO_CACHE_DIR=1
        RUN apt-get update && apt-get install -y --no-install-recommends \
                build-essential \
                libjpeg-dev zlib1g-dev libpng-dev libwebp-dev libtiff-dev \
                libfreetype6-dev liblcms2-dev libopenjp2-7-dev \
                libffi-dev libssl-dev \
                curl ca-certificates tini \
            && rm -rf /var/lib/apt/lists/*
        WORKDIR /app
        COPY --from=fetch /src/backend/requirements.txt /app/requirements.txt
        # emergentintegrations is hosted on a public extra index (not on pypi.org)
        RUN pip install --upgrade pip && \
            pip install --no-cache-dir \
                --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ \
                -r /app/requirements.txt
        COPY --from=fetch /src/backend/ /app/
        RUN useradd --create-home --uid 1001 erosapp && \
            mkdir -p /data && chown -R erosapp:erosapp /app /data
        USER erosapp
        EXPOSE 8001
        ENTRYPOINT ["/usr/bin/tini", "--"]
        CMD ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8001", "--proxy-headers", "--forwarded-allow-ips", "*"]
        HEALTHCHECK --interval=30s --timeout=5s --start-period=25s --retries=3 \
            CMD curl -fsS http://127.0.0.1:8001/api/legal/terms >/dev/null || exit 1
    environment:
      # Mongo-Verbindung (Auth + Default-DB)
      MONGO_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME:-eros}:${MONGO_INITDB_ROOT_PASSWORD:-eros-mongo-change-me}@mongo:27017/${MONGO_DB_NAME:-eros}?authSource=admin"
      DB_NAME: "${MONGO_DB_NAME:-eros}"
      # Optional: Ohne Wert erzeugt das Backend ein starkes Secret und legt es im Volume
      # /data/jwt_secret.key ab – JWT-Sessions überleben Restarts.
      JWT_SECRET: "${JWT_SECRET:-}"
      EROS_DATA_DIR: "/data"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8585}"
      EMERGENT_LLM_KEY: "${EMERGENT_LLM_KEY:-}"
      STRIPE_API_KEY: "${STRIPE_API_KEY:-}"
      PYTHONUNBUFFERED: "1"
    volumes:
      - backend_data:/data
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - eros_net
    # Kein Host-Port – Traffic läuft über den Frontend-Reverse-Proxy.

  frontend:
    image: eros-frontend:latest
    container_name: eros-frontend
    restart: unless-stopped
    build:
      context: .
      args:
        EROS_REPO: ${EROS_REPO:-https://github.com/itsbloodybyte/project-eros.git}
        EROS_REF: ${EROS_REF:-main}
        REACT_APP_BACKEND_URL: "${REACT_APP_BACKEND_URL:-}"
      dockerfile_inline: |
        # ---- Fetcher ----
        FROM alpine/git:latest AS fetch
        ARG EROS_REPO
        ARG EROS_REF
        RUN set -eux; \
            git clone --depth=1 --branch "$$EROS_REF" "$$EROS_REPO" /src

        # ---- Builder: CRA-Bundle bauen ----
        FROM node:20-bookworm-slim AS builder
        WORKDIR /app
        ARG REACT_APP_BACKEND_URL=""
        ENV REACT_APP_BACKEND_URL=$${REACT_APP_BACKEND_URL}
        # Komplettes Frontend-Verzeichnis rüberkopieren (yarn.lock ist im Repo
        # optional; bei Abwesenheit löst Yarn frisch auf).
        COPY --from=fetch /src/frontend/ ./
        RUN corepack enable && \
            if [ -f yarn.lock ]; then \
                yarn install --frozen-lockfile --network-timeout 120000; \
            else \
                yarn install --network-timeout 120000; \
            fi && \
            yarn build

        # ---- Runtime: nginx serviert das Bundle + proxyt /api ----
        FROM nginx:1.27-alpine
        RUN rm -f /etc/nginx/conf.d/default.conf
        COPY --from=fetch /src/frontend/nginx.conf /etc/nginx/conf.d/default.conf
        COPY --from=builder /app/build /usr/share/nginx/html
        EXPOSE 80
        HEALTHCHECK --interval=30s --timeout=5s --retries=3 \
            CMD wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1
        CMD ["nginx", "-g", "daemon off;"]
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-8585}:80"
    networks:
      - eros_net

  # ---------- Auto-Updater ----------
  # Prüft periodisch GitHub auf neue Commits im konfigurierten Branch.
  # Bei Änderung: Rebuild + Neustart von backend + frontend via Docker-Socket.
  # Über UPDATE_ENABLED=false komplett ausschaltbar. Signaldateien liegen im
  # geteilten Volume `backend_data`, damit das Backend-API den Status lesen kann.
  updater:
    image: eros-updater:latest
    container_name: eros-updater
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    build:
      context: .
      dockerfile_inline: |
        # syntax=docker/dockerfile:1.6
        FROM docker:cli
        RUN apk add --no-cache git curl bash docker-cli-compose coreutils || \
            apk add --no-cache git curl bash docker-compose coreutils
        # Embed the updater script via BuildKit COPY heredoc – no YAML/shell
        # escaping issues because BuildKit handles the file contents verbatim.
        COPY <<'SCRIPT_EOF' /usr/local/bin/updater.sh
        #!/bin/sh
        # Eros auto-update loop. Writes status to /data/updater.json so the
        # backend can surface it under /api/admin/system/updates.
        STATE=/data/updater.json
        TRIGGER=/data/updater.trigger
        mkdir -p /data

        write_state() {
          now="$(date -Iseconds 2>/dev/null || date)"
          printf '{"current_sha":"%s","latest_sha":"%s","last_check":"%s","last_update":"%s","enabled":%s,"message":"%s","interval":%s}\n' \
            "$1" "$2" "$now" "$3" "${UPDATE_ENABLED:-true}" "$4" "${UPDATE_INTERVAL_SECONDS:-3600}" > "$STATE.tmp" \
            && mv "$STATE.tmp" "$STATE"
        }

        rebuild() {
          PROJ="${COMPOSE_PROJECT_NAME:-eros}"
          echo "[updater] rebuilding project=$PROJ"
          docker compose -p "$PROJ" build --no-cache backend frontend && \
            docker compose -p "$PROJ" up -d backend frontend
        }

        echo "[updater] starting (interval=${UPDATE_INTERVAL_SECONDS:-3600}s, enabled=${UPDATE_ENABLED:-true}, repo=$EROS_REPO, ref=$EROS_REF)"
        CURR="$(cat /data/deployed_sha 2>/dev/null || echo '')"

        while :; do
          force=0
          if [ -f "$TRIGGER" ]; then force=1; rm -f "$TRIGGER"; fi
          if [ "${UPDATE_ENABLED:-true}" = "true" ] || [ $force -eq 1 ]; then
            LATEST="$(git ls-remote "$EROS_REPO" "$EROS_REF" 2>/dev/null | head -n1 | awk '{print $1}')"
            if [ -z "$LATEST" ]; then
              write_state "$CURR" "" "" "Konnte GitHub nicht erreichen"
            elif [ "$LATEST" != "$CURR" ] || [ $force -eq 1 ]; then
              write_state "$CURR" "$LATEST" "" "Update wird angewendet"
              if rebuild; then
                CURR="$LATEST"
                echo "$LATEST" > /data/deployed_sha
                write_state "$CURR" "$LATEST" "$(date -Iseconds)" "Erfolgreich aktualisiert"
              else
                write_state "$CURR" "$LATEST" "" "Rebuild fehlgeschlagen"
              fi
            else
              write_state "$CURR" "$LATEST" "" "Aktuell"
            fi
          else
            write_state "$CURR" "" "" "Auto-Update deaktiviert"
          fi
          sleep "${UPDATE_INTERVAL_SECONDS:-3600}"
        done
        SCRIPT_EOF
        RUN chmod +x /usr/local/bin/updater.sh
        ENTRYPOINT ["/usr/local/bin/updater.sh"]
    environment:
      EROS_REPO: ${EROS_REPO:-https://github.com/itsbloodybyte/project-eros.git}
      EROS_REF: ${EROS_REF:-main}
      UPDATE_INTERVAL_SECONDS: ${UPDATE_INTERVAL_SECONDS:-3600}
      UPDATE_ENABLED: ${UPDATE_ENABLED:-true}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-eros}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backend_data:/data
    networks:
      - eros_net

networks:
  eros_net:
    driver: bridge

volumes:
  mongo_data:
  mongo_config:
  backend_data:
