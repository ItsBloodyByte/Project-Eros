# =====================================================================
#  Eros – Full Stack Docker Compose
# =====================================================================
#  Quellcode wird DIREKT aus dem GitHub-Repository gezogen:
#      https://github.com/itsbloodybyte/project-eros
#
#  Dadurch ist ein lokales `git clone` NICHT nötig – nur diese
#  docker-compose.yml + eine `.env` Datei reichen aus.
#
#  Services:
#    mongo    : MongoDB 7 mit persistentem Volume.
#    backend  : FastAPI + WebSocket-Server (uvicorn auf :8001).
#    frontend : nginx serviert das gebaute React-Bundle und proxyt
#               /api sowie /api/ws/* an `backend`.
#
#  One-Command Start (in einem leeren Ordner):
#      curl -O https://raw.githubusercontent.com/itsbloodybyte/project-eros/main/docker-compose.yml
#      curl -O https://raw.githubusercontent.com/itsbloodybyte/project-eros/main/.env.example
#      cp .env.example .env        # dann Secrets eintragen
#      docker compose up --build -d
#
#  App erreichbar unter:  http://localhost:8080  (anpassbar via FRONTEND_HOST_PORT)
# =====================================================================

services:
  mongo:
    image: mongo:7
    container_name: eros-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-eros}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-eros-mongo-change-me}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-eros}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - eros_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # Kein Host-Port exponiert – nur das Backend erreicht Mongo.

  backend:
    build:
      # Remote-Git-Kontext: <repo>#<ref>:<subdir>
      context: ${EROS_REPO:-https://github.com/itsbloodybyte/project-eros.git}#${EROS_REF:-main}:backend
      dockerfile: Dockerfile
    image: eros-backend:latest
    container_name: eros-backend
    restart: unless-stopped
    environment:
      # Mongo-Verbindung (Auth + Default-DB)
      MONGO_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME:-eros}:${MONGO_INITDB_ROOT_PASSWORD:-eros-mongo-change-me}@mongo:27017/${MONGO_DB_NAME:-eros}?authSource=admin"
      DB_NAME: "${MONGO_DB_NAME:-eros}"
      # App-Secrets – zwingend in der .env Datei setzen.
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set – generate one with: python -c 'import secrets;print(secrets.token_urlsafe(64))'}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8080}"
      EMERGENT_LLM_KEY: "${EMERGENT_LLM_KEY:-}"
      STRIPE_API_KEY: "${STRIPE_API_KEY:-}"
      PYTHONUNBUFFERED: "1"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - eros_net
    # Kein Host-Port – Traffic läuft über den Frontend-Reverse-Proxy.

  frontend:
    build:
      # Remote-Git-Kontext: <repo>#<ref>:<subdir>
      context: ${EROS_REPO:-https://github.com/itsbloodybyte/project-eros.git}#${EROS_REF:-main}:frontend
      dockerfile: Dockerfile
      args:
        # Leer = same-origin: nginx (dieser Service) proxyt /api -> backend.
        REACT_APP_BACKEND_URL: "${REACT_APP_BACKEND_URL:-}"
    image: eros-frontend:latest
    container_name: eros-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    networks:
      - eros_net

networks:
  eros_net:
    driver: bridge

volumes:
  mongo_data:
  mongo_config:
