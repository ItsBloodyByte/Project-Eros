# =====================================================================
#  Eros – Full Stack Docker Compose
# =====================================================================
#  Services:
#    mongo    : MongoDB 7 with persistent volume.
#    backend  : FastAPI + WebSocket server (uvicorn on :8001).
#    frontend : nginx serving the built React bundle + reverse-proxying
#               /api and /api/ws/* into `backend`.
#
#  One-command start (from /app):
#      cp .env.example .env       # then fill in secrets
#      docker compose up --build -d
#
#  Reach the app at http://localhost:8080 (mapped below).
# =====================================================================

services:
  mongo:
    image: mongo:7
    container_name: eros-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-eros}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-eros-mongo-change-me}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-eros}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - eros_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # No host port exposed on purpose – only the backend reaches Mongo.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: eros-backend:latest
    container_name: eros-backend
    restart: unless-stopped
    environment:
      # Mongo wiring (auth + default DB)
      MONGO_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME:-eros}:${MONGO_INITDB_ROOT_PASSWORD:-eros-mongo-change-me}@mongo:27017/${MONGO_DB_NAME:-eros}?authSource=admin"
      DB_NAME: "${MONGO_DB_NAME:-eros}"
      # App secrets – SET THESE in your .env file.
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set – generate one with: python -c 'import secrets;print(secrets.token_urlsafe(64))'}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8080}"
      EMERGENT_LLM_KEY: "${EMERGENT_LLM_KEY:-}"
      STRIPE_API_KEY: "${STRIPE_API_KEY:-}"
      PYTHONUNBUFFERED: "1"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - eros_net
    # No host port – traffic enters through the frontend reverse-proxy.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Blank = same-origin: nginx (this service) proxies /api -> backend.
        REACT_APP_BACKEND_URL: "${REACT_APP_BACKEND_URL:-}"
    image: eros-frontend:latest
    container_name: eros-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    networks:
      - eros_net

networks:
  eros_net:
    driver: bridge

volumes:
  mongo_data:
  mongo_config:
