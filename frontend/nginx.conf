# Eros frontend: serves the CRA static bundle and proxies the backend API.
# Kept deliberately close to the production Kubernetes ingress semantics
# so local/staging behaviour matches production.

upstream eros_backend {
    server backend:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Generous payload ceiling for photo + video uploads (30MB videos, 8MB photos).
    client_max_body_size 45m;
    # Enable gzip for static assets (backend already gzips its JSON).
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Simple healthcheck for the container orchestrator.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # WebSocket chat endpoint must upgrade.
    location ~ ^/api/ws/ {
        proxy_pass http://eros_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API
    location /api/ {
        proxy_pass http://eros_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Static assets with long cache (hashed filenames).
    location /static/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA entry point (history-api fallback).
    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options DENY always;
        try_files $uri $uri/ /index.html;
    }
}
